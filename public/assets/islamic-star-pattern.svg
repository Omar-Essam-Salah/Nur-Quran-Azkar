<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="star-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- 8-pointed star polygon -->
      <polygon points="50,5 58,35 90,25 68,50 90,75 58,65 50,95 42,65 10,75 32,50 10,25 42,35" 
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
      <!-- Inner diamond -->
      <polygon points="50,25 65,50 50,75 35,50" 
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
      <!-- Corner circles -->
      <circle cx="50" cy="5" r="2" fill="rgba(255,255,255,0.06)"/>
      <circle cx="90" cy="25" r="2" fill="rgba(255,255,255,0.06)"/>
      <circle cx="90" cy="75" r="2" fill="rgba(255,255,255,0.06)"/>
      <circle cx="50" cy="95" r="2" fill="rgba(255,255,255,0.06)"/>
      <circle cx="10" cy="75" r="2" fill="rgba(255,255,255,0.06)"/>
      <circle cx="10" cy="25" r="2" fill="rgba(255,255,255,0.06)"/>
      <!-- Connecting lines -->
      <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
      <line x1="10" y1="25" x2="90" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
      <line x1="90" y1="25" x2="10" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#star-pattern)"/>
</svg>