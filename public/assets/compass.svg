<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="18"/>
  <circle cx="24" cy="24" r="15" stroke-opacity="0.4"/>
  <!-- Cardinal marks -->
  <line x1="24" y1="4" x2="24" y2="8"/>
  <line x1="24" y1="40" x2="24" y2="44"/>
  <line x1="4" y1="24" x2="8" y2="24"/>
  <line x1="40" y1="24" x2="44" y2="24"/>
  <!-- N letter -->
  <text x="24" y="3" text-anchor="middle" fill="white" stroke="none" font-size="6" font-family="Inter, sans-serif">N</text>
  <!-- Needle pointing northeast (toward Qibla) -->
  <polygon points="24,24 30,14 24,18" fill="rgba(212,175,55,0.8)" stroke="rgba(212,175,55,1)"/>
  <polygon points="24,24 18,34 24,30" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="white"/>
</svg>